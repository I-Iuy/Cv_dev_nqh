<!DOCTYPE html>
<html lang="en">
<head>
    <title>CV-Nguyễn Quốc Huy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Self-learning, contribution, responsibility">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: "Open Sans", sans-serif; }
    </style>
</head>

<body class="bg-gradient-to-r from-blue-300 via-purple-300 to-indigo-300 min-h-screen flex items-center justify-center py-8">
    <div class="fixed right-4 bottom-4 flex flex-col space-y-2 z-50">
        <div class="flex items-center space-x-2 bg-white p-2 rounded-lg shadow-lg">
            <i class="fas fa-download text-gray-700"></i>
            <button id="pdfDownload" class="relative w-14 h-7 bg-gray-300 rounded-full flex items-center transition duration-300" title="Tải CV & Chứng chỉ">
                <div class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full shadow-md flex items-center justify-center">
                    <i class="fas fa-file-pdf text-gray-700 text-xs"></i>
                </div>
            </button>
        </div>

        <div class="flex items-center space-x-2 bg-white p-2 rounded-lg shadow-lg">
            <span class="text-gray-700 font-semibold text-sm">EN</span>
            <button id="languageToggle" class="relative w-14 h-7 bg-gray-300 rounded-full flex items-center transition duration-300">
                <div id="toggleCircle" class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full shadow-md"></div>
            </button>
            <span class="text-gray-700 font-semibold text-sm">VI</span>
        </div>
    </div>

    <div class="max-w-5xl mx-auto p-4 w-full">
        <div class="bg-white shadow-xl rounded-lg p-6 flex flex-col md:flex-row gap-6">
            <div class="w-full md:w-1/3">
                <div class="text-center">
                    <img alt="Profile image" class="mx-auto mb-4 rounded-full border-4 border-blue-100 object-cover" height="150" src="1.jpg" width="150" />
                </div>
                <div class="text-center mt-4">
                    <h2 class="text-blue-700 text-2xl font-bold uppercase tracking-wide" data-i18n="name"></h2>
                </div>
                <div class="mt-4 text-center">
                    <div class="bg-gradient-to-r from-blue-700 to-gray-900 text-white font-bold py-2 px-4 rounded-lg w-full text-sm shadow-md uppercase" data-i18n="intern"></div>
                </div>
                <div class="mt-6 text-gray-700 text-sm space-y-3">
                    <p class="flex items-center"><i class="fas fa-birthday-cake w-6 text-blue-600"></i> <span data-i18n="birthday"></span></p>
                    <p class="flex items-center"><i class="fas fa-mars w-6 text-blue-600"></i> <span data-i18n="gender"></span></p>
                    <p class="flex items-center"><i class="fas fa-phone w-6 text-blue-600"></i> <span data-i18n="phone"></span></p>
                    <p class="flex items-center"><i class="fas fa-envelope w-6 text-blue-600"></i> <span data-i18n="email"></span></p>
                    <p class="flex items-center"><i class="fas fa-map-marker-alt w-6 text-blue-600"></i> <span data-i18n="address"></span></p>
                    <p class="flex items-center"><i class="fab fa-github w-6 text-blue-600"></i> <span data-i18n="github"></span></p>
                </div>
                
                <div class="mt-8">
                    <div class="bg-gradient-to-r from-blue-700 to-gray-900 text-white font-bold py-2 px-4 rounded-lg w-full text-center uppercase text-sm" data-i18n="project"></div>
                </div>
                <div class="mt-4 border-l-4 border-blue-500 pl-3">
                    <p class="text-blue-700 font-bold text-sm">SunShine Dental Care</p>
                    <p class="text-gray-500 text-xs italic mb-1">ReactJS, Spring Boot, SQL Server</p>
                    <p class="text-gray-700 text-xs leading-relaxed">Hệ thống ERP toàn diện tích hợp thanh toán, AI nhận diện dữ liệu và tự động hóa xử lý số liệu.</p>
                </div>
            </div>

            <div class="w-full md:w-2/3 flex flex-col gap-5">
                <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-gradient-to-r from-blue-700 to-gray-900 text-white p-3">
                        <h3 class="text-lg font-bold uppercase" data-i18n="introduction"></h3>
                    </div>
                    <div class="p-5 bg-white border-l-4 border-blue-500">
                        <p class="text-sm text-gray-700 leading-relaxed" data-i18n="looking_for"></p>
                    </div>
                </div>

                <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-gradient-to-r from-blue-700 to-gray-900 text-white p-3">
                        <h3 class="text-lg font-bold uppercase" data-i18n="education"></h3>
                    </div>
                    <div class="p-5 bg-white border-l-4 border-blue-500">
                        <p class="text-sm text-gray-800 font-medium leading-relaxed" data-i18n="certifications"></p>
                    </div>
                </div>

                <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-gradient-to-r from-blue-700 to-gray-900 text-white p-3">
                        <h3 class="text-lg font-bold uppercase" data-i18n="skills"></h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-5 bg-white border-l-4 border-blue-500 text-sm">
                        <div>
                            <h4 class="text-blue-700 font-bold mb-4 border-b border-gray-200 pb-1" data-i18n="soft_skills"></h4>
                            <p class="flex items-center mb-2 font-semibold text-gray-700"><i class="fas fa-comments w-6"></i> <span data-i18n="communication"></span></p>
                            <p class="flex items-center mb-2 font-semibold text-gray-700"><i class="fas fa-users w-6"></i> <span data-i18n="teamwork"></span></p>
                            <p class="flex items-center mb-2 font-semibold text-gray-700"><i class="fas fa-robot w-6 text-indigo-600"></i> <span data-i18n="self_learning"></span></p>
                            <p class="flex items-center font-semibold text-gray-700"><i class="fas fa-language w-6"></i> <span data-i18n="english"></span></p>
                        </div>
                        <div>
                            <h4 class="text-blue-700 font-bold mb-4 border-b border-gray-200 pb-1" data-i18n="programming_skills"></h4>
                            <p class="flex items-center font-medium text-gray-800 mb-3"><i class="fab fa-react w-6 text-blue-500 text-lg"></i> ReactJS / Vite</p>
                            <p class="flex items-center font-medium text-gray-800 mb-3"><i class="fab fa-java w-6 text-red-500 text-lg"></i> Spring Boot</p>
                            <p class="flex items-center font-medium text-gray-800 mb-3"><i class="fas fa-database w-6 text-gray-600 text-lg"></i> SQL Server</p>
                            <p class="flex items-center font-medium text-gray-800"><i class="fas fa-file-excel w-6 text-green-600 text-lg"></i> Excel / Data Processing</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/i18next@21.6.14/dist/umd/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <script>
        const languageToggle = document.getElementById("languageToggle");
        const toggleCircle = document.getElementById("toggleCircle");
        const pdfDownload = document.getElementById("pdfDownload");
        const pdfCircle = pdfDownload.querySelector("div");
        let currentLang = "vi"; 

        function changeLanguage(lang) {
            fetch("locales.json")
                .then(res => res.json())
                .then(data => {
                    document.querySelectorAll("[data-i18n]").forEach(el => {
                        const key = el.getAttribute("data-i18n");
                        if (data[lang] && data[lang][key]) {
                            el.innerHTML = data[lang][key];
                        }
                    });
                });
        }

        languageToggle.classList.add("bg-blue-500");
        languageToggle.classList.remove("bg-gray-300");
        toggleCircle.style.transform = "translateX(28px)";

        languageToggle.addEventListener("click", () => {
            currentLang = currentLang === "en" ? "vi" : "en";
            anime({ targets: toggleCircle, translateX: currentLang === "vi" ? 28 : 0, easing: "easeInOutQuad", duration: 300 });
            languageToggle.classList.toggle("bg-gray-300", currentLang === "en");
            languageToggle.classList.toggle("bg-blue-500", currentLang === "vi");
            changeLanguage(currentLang);
        });

        pdfDownload.addEventListener("click", () => {
            anime({ targets: pdfCircle, translateX: 28, easing: "easeInOutQuad", duration: 300 });
            pdfDownload.classList.remove("bg-gray-300");
            pdfDownload.classList.add("bg-blue-500");

            fetch("locales.json").then(res => res.json()).then(data => {
                const langData = data[currentLang];
                const pdf = langData.pdf_data;

                const docDefinition = {
                    pageSize: 'A4',
                    pageMargins: [40, 40, 40, 40],
                    content: [
                        {
                            columns: [
                                {
                                    width: '55%',
                                    stack: [
                                        { text: langData.name, fontSize: 22, bold: true, margin: [0, 0, 0, 5] },
                                        { text: langData.intern, fontSize: 11, color: '#555555' }
                                    ]
                                },
                                {
                                    width: '45%',
                                    stack: [
                                        { text: 'SĐT: ' + langData.phone, fontSize: 9, margin: [0, 0, 0, 4] },
                                        { text: 'Email: ' + langData.email, fontSize: 9, margin: [0, 0, 0, 4] },
                                        { text: 'Địa chỉ: ' + langData.address, fontSize: 9, margin: [0, 0, 0, 4] }
                                    ],
                                    alignment: 'left'
                                }
                            ],
                            margin: [0, 0, 0, 30] 
                        },
                        
                        {
                            columns: [
                                // CỘT TRÁI (Dự án & Kỹ năng)
                                {
                                    width: '35%',
                                    stack: [
                                        // Phần Dự Án
                                        {
                                            columns: [
                                                { text: langData.project.toUpperCase(), bold: true, width: 'auto', fontSize: 11, margin: [0, 0, 5, 0], noWrap: true },
                                                { canvas: [{ type: 'line', x1: 0, y1: 6, x2: 140, y2: 6, lineWidth: 1, color: '#cccccc' }], width: '*' }
                                            ],
                                            margin: [0, 0, 0, 15]
                                        },
                                        {
                                            columns: [
                                                {
                                                    width: 15,
                                                    canvas: [
                                                        { type: 'ellipse', x: 4, y: 5, r1: 3, r2: 3, color: 'black' },
                                                        { type: 'line', x1: 4, y1: 10, x2: 4, y2: 175, lineWidth: 1, dash: { length: 2 }, color: '#999999' }
                                                    ]
                                                },
                                                {
                                                    width: '*',
                                                    stack: [
                                                        { text: pdf.proj_name, bold: true, fontSize: 10, margin: [0, 0, 0, 5] },
                                                        { text: pdf.proj_role, italics: true, fontSize: 9, margin: [0, 0, 0, 4] },
                                                        { text: pdf.proj_tech, fontSize: 9, margin: [0, 0, 0, 5], color: '#444444' },
                                                        { text: pdf.proj_desc, fontSize: 9, alignment: 'justify', lineHeight: 1.4 }
                                                    ]
                                                }
                                            ]
                                        },
                                        // Phần Kỹ Năng (Thụt lề nhẹ cho các tiêu đề con)
                                        {
                                            columns: [
                                                { text: langData.skills.toUpperCase(), bold: true, width: 'auto', fontSize: 11, margin: [0, 0, 5, 0], noWrap: true },
                                                { canvas: [{ type: 'line', x1: 0, y1: 6, x2: 140, y2: 6, lineWidth: 1, color: '#cccccc' }], width: '*' }
                                            ],
                                            margin: [0, 20, 0, 10]
                                        },
                                        { text: pdf.tech_skills_title, bold: true, fontSize: 9, margin: [15, 0, 0, 6] },
                                        {
                                            margin: [30, 0, 0, 15],
                                            ul: pdf.tech_skills.map(item => ({ text: item, fontSize: 9, margin: [0, 0, 0, 4], lineHeight: 1.3 }))
                                        },
                                        { text: langData.soft_skills, bold: true, fontSize: 9, margin: [15, 0, 0, 6] },
                                        {
                                            margin: [30, 0, 0, 0],
                                            ul: [
                                                { text: langData.communication, fontSize: 9, margin: [0, 0, 0, 3] },
                                                { text: langData.teamwork, fontSize: 9, margin: [0, 0, 0, 3] },
                                                { text: langData.self_learning, fontSize: 9, margin: [0, 0, 0, 3] },
                                                { text: langData.english, fontSize: 9, margin: [0, 0, 0, 3] }
                                            ]
                                        }
                                    ]
                                },
                                
                                // CỘT PHẢI (Mục tiêu, Học vấn, Chứng chỉ)
                                {
                                    width: '65%',
                                    padding: [30, 0, 0, 0], 
                                    stack: [
                                        // Mục tiêu nghề nghiệp
                                        {
                                            columns: [
                                                { text: langData.introduction.toUpperCase(), bold: true, width: 'auto', fontSize: 11, margin: [0, 0, 5, 0], noWrap: true },
                                                { canvas: [{ type: 'line', x1: 0, y1: 6, x2: 280, y2: 6, lineWidth: 1, color: '#cccccc' }], width: '*' }
                                            ],
                                            margin: [30, 0, 0, 10]
                                        },
                                        { text: pdf.objective, fontSize: 9, alignment: 'justify', margin: [30, 0, 0, 20], lineHeight: 1.4 },

                                        // Học vấn
                                        {
                                            columns: [
                                                { text: langData.education.toUpperCase(), bold: true, width: 'auto', fontSize: 11, margin: [0, 0, 5, 0], noWrap: true },
                                                { canvas: [{ type: 'line', x1: 0, y1: 6, x2: 280, y2: 6, lineWidth: 1, color: '#cccccc' }], width: '*' }
                                            ],
                                            margin: [30, 0, 0, 10]
                                        },
                                        { text: pdf.ed_time, fontSize: 9, color: '#555', margin: [30, 0, 0, 4] },
                                        { text: pdf.ed_title, bold: true, fontSize: 10, margin: [30, 0, 0, 4] },
                                        { 
                                            text: [
                                                { text: pdf.ed_school_name },
                                                { text: pdf.ed_school_grade, bold: true }
                                            ], 
                                            fontSize: 9, margin: [30, 0, 0, 20] 
                                        },

                                        // Chứng chỉ
                                        {
                                            columns: [
                                                { text: pdf.cert_title.toUpperCase(), bold: true, width: 'auto', fontSize: 11, margin: [0, 0, 5, 0], noWrap: true },
                                                { canvas: [{ type: 'line', x1: 0, y1: 6, x2: 280, y2: 6, lineWidth: 1, color: '#cccccc' }], width: '*' }
                                            ],
                                            margin: [30, 0, 0, 10]
                                        },
                                        {
                                            margin: [45, 0, 0, 20], 
                                            ul: pdf.cert_list.map(item => ({ text: item, fontSize: 9, margin: [0, 0, 0, 3] }))
                                        }
                                    ]
                                }
                            ]
                        }
                    ],
                    defaultStyle: {
                        font: 'Roboto' 
                    }
                };

                pdfMake.createPdf(docDefinition).download(`CV_NguyenQuocHuy_${currentLang.toUpperCase()}.pdf`);

                const certFiles = [
                    "Cert_NeuralNetworks_DeepLearning.pdf",
                    "Cert_ML_NLP_Basics.pdf",
                    "Cert_UsingDatabases_Python.pdf"
                ];

                certFiles.forEach((file, index) => {
                    setTimeout(() => {
                        const link = document.createElement('a');
                        link.href = file;
                        link.download = file;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, (index + 1) * 800); 
                });

                setTimeout(() => {
                    anime({ targets: pdfCircle, translateX: 0, easing: "easeInOutQuad", duration: 300 });
                    pdfDownload.classList.add("bg-gray-300");
                    pdfDownload.classList.remove("bg-blue-500");
                }, 3500); 
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            changeLanguage(currentLang);
        });
    </script>
</body>
</html>
